services:
  app:
    build: .
    image: campus-life-simulator:latest
    environment:
      - DISPLAY=${DISPLAY:-:0}
    volumes:
      # X11 转发: Linux socket + Windows/WSL2 (WSLg 自动处理)
      - /tmp/.X11-unix:/tmp/.X11-unix:ro
      # 动态挂载资源文件，修改 quests.json 无需重建镜像
      - ./assets:/app/assets:ro
    # macOS XQuartz 需要额外允许网络连接: xhost +localhost
    # 然后运行: DISPLAY=host.docker.internal:0 docker compose up
